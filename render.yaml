services:
  - type: web
    name: ots-teen-agent
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY      # interview + scoring
        sync: false
      - key: DATABASE_URL          # Postgres (Internal Database URL) for server-side sessions
        sync: false
      - key: TEEN_MAKE_WEBHOOK_URL  # parent-report delivery (teen agent's OWN webhook)
        sync: false
      - key: MAKE_SHARED_SECRET     # gates the parent-report webhook
        sync: false
      - key: EMAIL_USER             # Gmail account for safety alerts
        sync: false
      - key: EMAIL_PASS             # Gmail app password
        sync: false
      - key: SAFETY_ALERT_TO        # where CRISIS/ABUSE alerts go (defaults to EMAIL_USER)
        sync: false
      - key: ARCHIVE_EMAIL_TO       # TEST PHASE ONLY: full session record emailed here; clear to disable
        sync: false
      - key: PUBLIC_BASE_URL        # optional; clean teen-link base
        sync: false
      - key: GA4_MEASUREMENT_ID     # optional; server-side GA4 MP funnel events (with GA4_MP_API_SECRET)
        sync: false
      - key: GA4_MP_API_SECRET      # optional; GA4 Measurement Protocol API secret
        sync: false
      - key: GHL_SYNC_WEBHOOK_URL   # optional; CRM sync webhook for Map funnel tags
        sync: false
      - key: LAUNCH_MODE            # beta (default) | production — gates go-live in /api/health
        sync: false
      - key: SAFETY_REVIEW_APPROVED # "true" ONLY after counsel signs off SAFETY-SOP
        sync: false
      - key: SESSION_RETENTION_DAYS # session TTL in days (default 30)
        sync: false
      - key: UNSHARED_RESULT_RETENTION_DAYS # unshared finished-result purge window (default 7)
        sync: false
      - key: PAYMENT_REQUIRED       # PR E: true to require the $47 paid-pass at register (beta=false)
        sync: false
      - key: MAP_PAYMENT_URL        # Stripe Payment Link for the $47 Map
        sync: false
      - key: STRIPE_SECRET_KEY      # verifies the Stripe checkout session at /paid
        sync: false
      - key: PAYPASS_SECRET         # HMAC key for the paid-pass cookie (else MAKE_SHARED_SECRET)
        sync: false
      - key: MAP_ENTITLING_PRODUCTS # Stripe product ids that unlock the Map ($47 Map + $97 Side Hustle)
        sync: false
