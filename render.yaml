services:
  - type: web
    name: ots-teen-agent
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TOKEN_SIGNING_SECRET
        sync: false
      - key: TEEN_MAKE_WEBHOOK_URL
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
