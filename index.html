<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Outsmart the System — Teen Check</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0c0f14; color: #e8eaed; padding: 24px; line-height: 1.5;
    }
    .card {
      max-width: 560px; width: 100%; background: #141923; border: 1px solid #232a36;
      border-radius: 16px; padding: 32px;
    }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .sub { color: #8a93a6; font-size: 14px; margin: 0 0 24px; }
    .row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1e242f; }
    .row:last-of-type { border-bottom: none; }
    .k { color: #8a93a6; font-size: 14px; }
    .v { font-weight: 600; }
    .err { background: #2a1416; border: 1px solid #5a2730; color: #ffb4b4; padding: 16px; border-radius: 10px; font-size: 14px; }
    .note { margin-top: 24px; padding: 14px 16px; background: #101620; border: 1px dashed #2c3647; border-radius: 10px; color: #8a93a6; font-size: 13px; }
    .pill { display: inline-block; font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: #6fd3a0; background: #102019; border: 1px solid #1d4534; padding: 3px 9px; border-radius: 999px; margin-bottom: 16px; }
    code { background: #0a0d12; padding: 2px 6px; border-radius: 5px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="pill">Foundation · smoke test</div>
    <h1>Teen Check</h1>
    <p class="sub">Verifying the parent → teen session-token handoff.</p>
    <div id="content">Loading…</div>
    <div class="note">
      This page is the <strong>foundation seam</strong>. When the values below resolve from a valid
      token, the token contract works end to end. The turn-by-turn interview UI (the chat.js port)
      replaces this page next.
    </div>
  </div>

  <script>
    (function () {
      const content = document.getElementById('content');
      const params = new URLSearchParams(location.search);
      const token = params.get('t');

      if (!token) {
        content.innerHTML = '<div class="err">No session token in the URL. Open this page via a link from registration (it ends with <code>/?t=…</code>). Use <code>/dev-register.html</code> to mint one.</div>';
        return;
      }

      fetch('/api/session?t=' + encodeURIComponent(token))
        .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
        .then(function (res) {
          if (!res.ok) {
            content.innerHTML = '<div class="err">' + (res.j.error || 'Could not load session') + '</div>';
            return;
          }
          const s = res.j;
          content.innerHTML =
            row('Teen first name', s.teen_first_name) +
            row('Teen age', s.teen_age) +
            row('Age + 3 (pre-computed)', s.teen_age_plus_3) +
            row('Parent first name', s.parent_first_name) +
            row('Parent email exposed to teen?', 'No — server-side only ✓');
        })
        .catch(function (e) {
          content.innerHTML = '<div class="err">Network error: ' + e.message + '</div>';
        });

      function row(k, v) {
        return '<div class="row"><span class="k">' + k + '</span><span class="v">' + v + '</span></div>';
      }
    })();
  </script>
</body>
</html>
