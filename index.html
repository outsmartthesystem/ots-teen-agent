<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Outsmart the System — Teen Check</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0c0f14; --panel: #141923; --panel-2: #101620; --line: #232a36;
      --text: #e8eaed; --muted: #8a93a6; --accent: #2f6df0; --accent-2: #6fb3ff;
      --good: #6fd3a0; --warn: #f0c674; --danger: #ffb4b4;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; min-height: 100dvh; margin: 0; }
    body { padding-bottom: env(safe-area-inset-bottom); }
    body {
      background: var(--bg); color: var(--text); line-height: 1.5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column;
    }
    .screen { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .card { max-width: 640px; width: 100%; background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 28px; }
    .pill { display: inline-block; font-size: 11px; letter-spacing: .05em; text-transform: uppercase; color: var(--good); background: #102019; border: 1px solid #1d4534; padding: 3px 9px; border-radius: 999px; margin-bottom: 14px; }
    h1 { font-size: 22px; margin: 0 0 6px; }
    h2 { font-size: 20px; margin: 0 0 10px; }
    .muted { color: var(--muted); }
    code { background: #0a0d12; padding: 2px 6px; border-radius: 5px; font-size: 12px; }
    .btn { border: none; border-radius: 10px; padding: 12px 18px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #3b78ff; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); }
    .btn-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }

    /* Chat layout */
    #screen-chat { padding: 0; align-items: stretch; }
    .chat-wrap { width: 100%; max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; height: 100%; }
    .chat-header { padding: 13px 20px; border-bottom: 1px solid var(--line); display: flex; flex-direction: column; gap: 9px; }
    .chat-header-top { display: flex; align-items: center; gap: 10px; }
    .chat-header .dot-logo { width: 9px; height: 9px; border-radius: 50%; background: var(--good); flex: none; }
    .chat-header h1 { font-size: 16px; margin: 0; }
    .chat-progress { display: flex; align-items: center; gap: 10px; }
    .cp-track { flex: 1; height: 6px; border-radius: 999px; background: var(--panel-2); border: 1px solid var(--line); overflow: hidden; }
    .cp-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius: 999px; transition: width .45s ease; }
    .cp-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .messages-area { flex: 1; overflow-y: auto; padding: 20px; }
    #messages { display: flex; flex-direction: column; gap: 14px; }
    .message { max-width: 86%; padding: 12px 15px; border-radius: 14px; white-space: normal; animation: fadeUp .35s ease forwards; opacity: 0; }
    .message.agent { background: var(--panel); border: 1px solid var(--line); align-self: flex-start; border-bottom-left-radius: 4px; }
    .message.user { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .message.status { background: var(--panel-2); border: 1px dashed var(--line); color: var(--muted); align-self: center; font-size: 14px; text-align: center; max-width: 100%; }
    .message.thinking { background: var(--panel); border: 1px solid var(--line); align-self: flex-start; display: flex; gap: 5px; align-items: center; }
    .message.thinking.thinking-text { font-style: italic; color: var(--muted); }
    .message.thinking .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: blink 1.4s infinite both; }
    .message.thinking .dot:nth-child(2) { animation-delay: .2s; }
    .message.thinking .dot:nth-child(3) { animation-delay: .4s; }
    .resources { align-self: stretch; max-width: 100%; background: #1a130c; border: 1px solid #4a3a16; border-radius: 12px; padding: 14px 16px; }
    .resources strong { color: var(--warn); display: block; margin-bottom: 4px; }
    .resources p { margin: 0; font-size: 14px; }

    .input-controls { display: flex; justify-content: space-between; gap: 10px; padding: 8px 16px 0; }
    .ctrl-btn { background: transparent; border: 1px solid var(--line); color: var(--muted); font-size: 12.5px; padding: 5px 11px; border-radius: 8px; cursor: pointer; font-family: inherit; }
    .ctrl-btn:hover { color: var(--text); border-color: var(--accent); }
    .ctrl-end { color: #c98; border-color: transparent; }
    .ctrl-end:hover { color: var(--danger); border-color: #5a2730; }
    .input-bar { border-top: 1px solid var(--line); padding: 14px 16px; display: flex; gap: 10px; align-items: flex-end; }
    #userInput { flex: 1; resize: none; min-height: 44px; max-height: 140px; padding: 11px 14px; border-radius: 12px; border: 1px solid var(--line); background: var(--panel-2); color: var(--text); font-size: 15px; font-family: inherit; }
    #userInput:focus { outline: none; border-color: var(--accent); }
    #sendButton { background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 0 18px; height: 44px; font-weight: 600; cursor: pointer; }
    #sendButton:disabled { opacity: .5; cursor: default; }

    /* Result screen */
    #screen-result { overflow-y: auto; align-items: flex-start; padding: 32px 16px; }
    #screen-result .card { margin: auto; max-width: 600px; }
    .stage-badge { display: inline-block; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; font-weight: 700; color: #0c0f14; background: var(--good); padding: 5px 12px; border-radius: 999px; margin-bottom: 10px; }
    .partial-note { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .result-h1 { font-size: 24px; margin: 0 0 14px; }
    .mirror { font-size: 17px; color: var(--accent-2); border-left: 3px solid var(--accent); padding-left: 14px; margin: 0 0 22px; }
    .confidence-note { font-size: 13px; color: var(--muted); margin: 0 0 22px; }
    .gap-section { margin: 0 0 24px; padding: 16px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px; }
    .gap-title { font-size: 12px; letter-spacing: .05em; text-transform: uppercase; color: var(--accent-2); margin-bottom: 12px; }
    .ladder { display: flex; gap: 4px; }
    .ladder-step { flex: 1; text-align: center; font-size: 10.5px; padding: 7px 2px; border-radius: 6px; background: #0a0d12; border: 1px solid var(--line); color: var(--muted); line-height: 1.25; }
    .ladder-step.done { color: #5a6679; }
    .ladder-step.current { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
    .ladder-step.next { border-color: var(--good); color: var(--good); }
    .ladder-label { font-size: 13px; color: var(--text); margin-top: 10px; }
    .gap-horizon { font-size: 14.5px; color: var(--text); margin: 12px 0 0; }
    .skills-optin { margin: 0 0 22px; padding: 16px; background: #101a30; border: 1px solid #25406e; border-radius: 12px; }
    .skills-optin-title { font-size: 15px; font-weight: 700; color: var(--accent-2); margin-bottom: 6px; }
    .skills-optin-text { font-size: 14px; color: var(--muted); margin: 0 0 14px; }
    .skills-optin-btn { width: 100%; }
    .mj-section { margin: 0 0 24px; padding: 16px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px; }
    .mj-title { font-size: 12px; letter-spacing: .05em; text-transform: uppercase; color: var(--good); margin-bottom: 12px; }
    .mj-summary { font-size: 14.5px; color: var(--text); margin: 12px 0 0; }
    .mj-scenarios { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
    .mj-scenario { background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 11px 13px; }
    .mj-scenario-lesson { font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: var(--good); margin-bottom: 4px; }
    .mj-scenario-read { font-size: 13.5px; color: var(--text); }
    .mj-scenario-quote { font-size: 12.5px; font-style: italic; color: var(--muted); margin-top: 5px; }
    .bars { display: flex; flex-direction: column; gap: 10px; margin: 0 0 26px; }
    .bar-row { display: grid; grid-template-columns: 116px 1fr 84px; align-items: center; gap: 10px; }
    .bars-legend { font-size: 12px; color: var(--muted); margin: 0 0 12px; }
    .evidence-block { margin: 26px 0 22px; padding-top: 18px; border-top: 1px solid var(--line); }
    .evidence-block .stage-badge { margin-bottom: 10px; }
    .bar-label { font-size: 13px; color: var(--muted); }
    .bar-track { height: 10px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
    .bar-track.empty { background: transparent; border-style: dashed; display: flex; align-items: center; overflow: visible; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--good)); border-radius: 999px; transition: width .5s ease; }
    .bar-empty { font-size: 11px; color: var(--muted); padding-left: 8px; white-space: nowrap; }
    .bar-score { font-size: 11px; font-weight: 600; text-align: right; color: var(--accent-2); }
    .bar-score.muted { color: var(--muted); font-weight: 400; }
    .result-section { margin: 0 0 22px; }
    .section-title { font-size: 13px; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); margin: 0 0 8px; }
    .result-section p { margin: 0; }
    .evidence { margin: 10px 0 0; padding: 10px 14px; background: var(--panel-2); border-left: 3px solid var(--good); border-radius: 0 8px 8px 0; font-style: italic; }
    .result-section.move { background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px; padding: 16px; }
    .result-section.move .section-title { color: var(--good); }
    .result-section.pathway { background: #101a16; border: 1px solid #1d4534; border-radius: 12px; padding: 16px; }
    .choice-title { font-size: 13px; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); margin: 24px 0 10px; }
    .choice { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .choice-card { background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px; padding: 16px; font-size: 14px; color: var(--text); font-family: inherit; text-align: left; cursor: pointer; transition: border-color .15s, background .15s; }
    .choice-card:hover { border-color: var(--accent-2); }
    .ots-panel { margin: 14px 0 0; padding: 16px; background: #0e1830; border: 1px solid var(--accent); border-radius: 12px; }
    .ots-panel-title { font-size: 15px; font-weight: 700; color: var(--accent-2); margin-bottom: 6px; }
    .ots-panel-text { font-size: 14px; color: var(--muted); margin: 0 0 8px; }
    .ots-lessons { margin: 0 0 14px; padding-left: 20px; }
    .ots-lessons li { font-size: 14px; color: var(--text); margin-bottom: 4px; }
    .ots-link { display: inline-block; width: auto; text-decoration: none; margin: 0; }
    .solo-note { margin: 12px 0 0; padding: 12px 14px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; font-size: 13.5px; color: var(--text); }
    .choice-card.primary { border-color: var(--accent); background: #0e1830; }
    .next-note { margin-top: 24px; padding: 12px 14px; background: var(--panel-2); border: 1px dashed var(--line); border-radius: 10px; color: var(--muted); font-size: 13px; }
    @media (max-width: 480px) { .choice { grid-template-columns: 1fr; } .bar-row { grid-template-columns: 104px 1fr 20px; } }

    /* Preview / veto screen */
    #screen-preview, #screen-sent { overflow-y: auto; align-items: flex-start; padding: 32px 16px; }
    #screen-preview .card, #screen-sent .card { margin: auto; max-width: 600px; }
    .pv-h1 { font-size: 22px; margin: 0 0 8px; }
    .pv-intro { color: var(--muted); font-size: 14px; margin: 0 0 22px; }
    .pv-item { background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px; padding: 16px; margin-bottom: 12px; transition: opacity .2s; }
    .pv-item.private { opacity: .5; }
    .pv-cat { font-size: 11px; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .pv-text { font-size: 15px; }
    .pv-quote { margin: 10px 0 0; padding-left: 12px; border-left: 3px solid var(--good); font-style: italic; }
    .pv-edit-area { width: 100%; margin-top: 6px; min-height: 70px; padding: 10px; border-radius: 8px; border: 1px solid var(--accent); background: var(--bg); color: var(--text); font: inherit; font-size: 15px; resize: vertical; }
    .pv-actions { display: flex; gap: 8px; margin-top: 12px; }
    .pv-toggle, .pv-edit, .pv-quote-toggle { font-size: 13px; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--line); background: transparent; color: var(--text); cursor: pointer; font-family: inherit; }
    .pv-toggle { border-color: var(--good); color: var(--good); }
    .pv-quote-toggle { border-color: var(--good); color: var(--good); font-size: 12px; }
    .pv-quote-toggle.off { border-color: var(--line); color: var(--muted); }
    .pv-support { margin: 22px 0 0; }
    .pv-support-label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 7px; }
    .pv-support-input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--line); background: var(--panel-2); color: var(--text); font: inherit; font-size: 14px; resize: vertical; }
    .pv-support-input:focus { outline: none; border-color: var(--accent); }
    .pv-toggle.off { border-color: var(--line); color: var(--muted); }
    .pv-readonly { margin: 22px 0; padding: 16px; background: var(--panel); border: 1px dashed var(--line); border-radius: 12px; }
    .pv-ro-title { font-size: 12px; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .pv-readonly p { margin: 0 0 8px; font-size: 13px; color: var(--muted); }
    .pv-readonly ul { margin: 0 0 8px; padding-left: 18px; }
    .pv-readonly li { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .pv-send-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
    .pv-send { flex: 1; min-width: 180px; }
    .pv-error { margin-top: 12px; color: var(--danger); font-size: 13px; }
    .result-cta { margin-top: 24px; width: 100%; }
    .result-pdf { width: 100%; margin-top: 16px; }
    .err-box { background: #2a1416; border: 1px solid #5a2730; color: var(--danger); padding: 16px; border-radius: 10px; }
    .spinner { width: 26px; height: 26px; border: 3px solid var(--line); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 14px; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes blink { 0%, 80%, 100% { opacity: .2; } 40% { opacity: 1; } }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Accessibility: clear focus rings + honor reduced-motion. */
    :focus-visible { outline: 2px solid var(--accent-2); outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
      .message { opacity: 1 !important; }
    }
  </style>
</head>
<body>

  <!-- LOADING -->
  <div class="screen" id="screen-loading" style="display:flex;">
    <div style="text-align:center;">
      <div class="spinner" style="margin:0 auto 14px;"></div>
      <p class="muted">Getting things ready…</p>
    </div>
  </div>

  <!-- ERROR -->
  <div class="screen" id="screen-error">
    <div class="card">
      <h1>Hmm.</h1>
      <div class="err-box" id="errorBody">Something went wrong.</div>
    </div>
  </div>

  <!-- RESUME -->
  <div class="screen" id="screen-resume">
    <div class="card">
      <div class="pill">Welcome back</div>
      <h1>Pick up where you left off?</h1>
      <p class="muted">You started this already. Want to keep going, or start over?</p>
      <div class="btn-row">
        <button class="btn btn-primary" id="resumeBtn">Keep going</button>
        <button class="btn btn-ghost" id="freshBtn">Start over</button>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="screen" id="screen-chat">
    <div class="chat-wrap">
      <div class="chat-header">
        <div class="chat-header-top">
          <span class="dot-logo"></span>
          <h1 id="chatHeading">Teen Check</h1>
        </div>
        <div class="chat-progress" id="chatProgress" style="display:none">
          <div class="cp-track"><div class="cp-fill" id="cpFill"></div></div>
          <div class="cp-label" id="cpLabel"></div>
        </div>
      </div>
      <div class="messages-area" id="messagesArea">
        <div id="messages" aria-live="polite" aria-atomic="false" role="log"></div>
      </div>
      <div class="input-controls">
        <button class="ctrl-btn" id="skipBtn" type="button">Skip this one</button>
        <button class="ctrl-btn ctrl-end" id="endBtn" type="button">End &amp; clear this device</button>
      </div>
      <div class="input-bar" id="inputBar">
        <textarea id="userInput" rows="1" placeholder="Type your answer…" aria-label="Type your answer"></textarea>
        <button id="sendButton">Send</button>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="card" id="resultBody"></div>
  </div>

  <!-- PREVIEW / VETO -->
  <div class="screen" id="screen-preview">
    <div class="card" id="previewBody"></div>
  </div>

  <!-- SENT -->
  <div class="screen" id="screen-sent">
    <div class="card" id="sentBody"></div>
  </div>

  <script src="vendor/jspdf.umd.min.js"></script>
  <!-- prompts.js intentionally NOT loaded: prompts live server-side (Phase 4). -->
  <script src="chat.js"></script>
</body>
</html>
